<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="clipboard-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.0" />
    </linearGradient>
  </defs>
  <!-- Background Glow -->
  <circle cx="60" cy="60" r="50" fill="url(#glow-grad)" />
  <!-- Clipboard Board -->
  <rect x="35" y="25" width="50" height="70" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
  <!-- Clipboard Paper -->
  <rect x="42" y="38" width="36" height="50" rx="2" fill="url(#clipboard-grad)" />
  <!-- Clip -->
  <rect x="50" y="18" width="20" height="10" rx="3" fill="#94A3B8" />
  <rect x="55" y="21" width="10" height="4" rx="1" fill="#64748B" />
  <!-- Lines representing tasks -->
  <line x1="48" y1="48" x2="62" y2="48" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" />
  <line x1="48" y1="58" x2="72" y2="58" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />
  <line x1="48" y1="68" x2="58" y2="68" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" />
  <line x1="48" y1="78" x2="68" y2="78" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />
  <!-- Tiny decorative sparkles -->
  <path d="M25 40l2 2-2 2-2-2z" fill="#60A5FA" />
  <path d="M95 70l2 2-2 2-2-2z" fill="#34D399" />
  <path d="M85 30l3 3-3 3-3-3z" fill="#FBBF24" />
</svg>
